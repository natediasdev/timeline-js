<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Linha do Tempo Customizada</title>
    
    <!-- ✅ CSS oficial do TimelineJS (URL corrigida) -->
    <link title="timeline-styles" rel="stylesheet" href="https://cdn.knightlab.com/libs/timeline3/latest/css/timeline.css">
    
    <!-- Fontes históricas: Cinzel (títulos) + Lora (corpo) -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

    <style>
        /* ─── BASE ──────────────────────────────────────────── */
        html, body {
            width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
            background: #0f0f1a;
        }
        #timeline-embed {
            width: 100%; height: 100vh;
        }

        /* ─── PAINEL DO SLIDE (parte superior) ──────────────── */
        .tl-slide .tl-slide-content, .tl-slide-content-container, .tl-slide-scrollable-container {
            background: #12122a !important;
        }
        .tl-slide .tl-slide-content .tl-text {
            background: #12122a !important;
        }
        .tl-slide .tl-headline-date {
            font-family: 'Cinzel', serif !important;
            font-size: 13px !important;
            letter-spacing: 3px !important;
            color: #c9972a !important;
            text-transform: uppercase !important;
        }
        h2.tl-headline {
            font-family: 'Cinzel', serif !important;
            font-size: 28px !important;
            font-weight: 600 !important;
            color: #f5e6c8 !important;
            line-height: 1.25 !important;
        }
        h2.tl-headline.tl-headline-title {
            font-size: 38px !important;
            color: #ffffff !important;
        }
        .tl-slide .tl-text .tl-text-content p {
            font-family: 'Lora', serif !important;
            font-size: 16px !important;
            line-height: 1.75 !important;
            color: #c8bfae !important;
        }
        .tl-credit {
            font-family: 'Lora', serif !important;
            font-size: 12px !important;
            color: #7a7060 !important;
        }
        .tl-caption {
            font-family: 'Lora', serif !important;
            font-size: 13px !important;
            color: #9a9080 !important;
        }

        /* ─── NAVEGAÇÃO ENTRE SLIDES ─────────────────────────── */
        .tl-slidenav-next,
        .tl-slidenav-previous {
            color: #c9972a !important;
        }
        .tl-slidenav-next:hover,
        .tl-slidenav-previous:hover {
            color: #f5c84a !important;
        }
        .tl-slidenav-title {
            font-family: 'Lora', serif !important;
            color: #fff !important;
        }

        /* ─── TIMENAV (navegador de tempo inferior) ──────────── */
        .tl-timenav {
            background: #0b0b1c !important;
            border-top: 2px solid #c9972a !important;
        }

        /* ─── FIX DE ERAS ──────  */
        .tl-timenav .tl-timenav-background {
            top: 0 !important;
            height: 28px !important;
            overflow: hidden !important;
        }
        .tl-timenav .tl-era {
            top: 0 !important;
            height: 28px !important;
            line-height: 28px !important;
            opacity: 0.92 !important;
            border-left: 1px solid rgba(255,255,255,0.15) !important;
        }
        .tl-timenav .tl-era-text {
            font-family: 'Cinzel', serif !important;
            font-size: 10px !important;
            font-weight: 600 !important;
            letter-spacing: 2px !important;
            text-transform: uppercase !important;
        }
        .tl-timeera {
            bottom: 40px !important;
        }

        /* ─── EIXO DE TEMPO (ticks) ──────────────────────────── */
        .tl-timenav .tl-timeaxis {
            bottom: 0 !important;
        }
        .tl-timeaxis-major .tl-timeaxis-tick {
            background-color: #c9972a !important;
        }
        .tl-timeaxis-major .tl-timeaxis-tick-text {
            font-family: 'Cinzel', serif !important;
            font-size: 11px !important;
            color: #c9972a !important;
        }
        .tl-timeaxis-minor .tl-timeaxis-tick {
            background-color: #3a3a5a !important;
        }
        .tl-timeaxis-minor .tl-timeaxis-tick-text {
            font-family: 'Lora', serif !important;
            font-size: 10px !important;
            color: #5a5a7a !important;
        }

        /* ─── MARCADORES (flags dos eventos) ─────────────────── */
        .tl-timemarker .tl-timemarker-content-container {
            background: #1e1e3a !important;
            border: 1px solid #3a3a6a !important;
            box-shadow: 1px 1px 1px rgba(0, 0, 0, 0.3);
        }
        .tl-timemarker.tl-timemarker-active .tl-timemarker-content-container {
            background: #c9972a !important;
            border-color: #f5c84a !important;
        }
        .tl-timemarker .tl-headline {
            font-family: 'Cinzel', serif !important;
            font-size: 11px !important;
            color: #c8bfae !important;
        }
        .tl-timemarker.tl-timemarker-active .tl-headline {
            color: #0f0f1a !important;
        }
        .tl-timemarker .tl-timemarker-line-left,
        .tl-timemarker .tl-timemarker-line-right {
            background: #3a3a6a !important;
            z-index: -1;
        }
        .tl-timemarker.tl-timemarker-active .tl-timemarker-line-left,
        .tl-timemarker.tl-timemarker-active .tl-timemarker-line-right {
            background: #c9972a !important;
        }

        /* ─── BOTÕES DE ZOOM ──────────────────────────────────── */
        .tl-timenav-zoom-in,
        .tl-timenav-zoom-out {
            background: #1e1e3a !important;
            color: #c9972a !important;
            border: 1px solid #3a3a5a !important;
        }
        .tl-timenav-zoom-in:hover,
        .tl-timenav-zoom-out:hover {
            background: #c9972a !important;
            color: #0f0f1a !important;
        }
    </style>
</head>
<body>

    <div id="timeline-embed"></div>

    <!-- ✅ Script JS oficial do TimelineJS (URL corrigida, sem defer para garantir carregamento síncrono) -->
    <script src="https://cdn.knightlab.com/libs/timeline3/latest/js/timeline.js"></script>

    <script type="text/javascript">
        // Garante que o script espere o DOM estar 100% pronto
        window.addEventListener('load', function() {
            if (typeof TL !== 'undefined') {
                var options = {
                    language: "pt-br",
                    initial_zoom: 3,
                    timenav_height_percentage: 45,
                    is_embed: true
                };

                var spreadsheet_url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTbZ24kupL50AYzRtPpInT5zNCu9Y8vZlmtKN5oea6YyStj1kS5ovC3Iy4QUl16D7635HpOU4PAzgK-/pub?gid=0&single=true&output=csv";

                window.timeline = new TL.Timeline('timeline-embed', spreadsheet_url, options);
            } else {
                console.error("A biblioteca TimelineJS não pôde ser carregada a tempo.");
            }
        });
    </script>
</body>
</html>
