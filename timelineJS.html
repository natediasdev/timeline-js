<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Linha do Tempo Customizada</title>
    
    <!-- Arquivo de estilos padrão da Knight Lab -->
    <link title="timeline-styles" rel="stylesheet" href="https://knightlab.com">
    
    <style>
        /* Garante que o aplicativo ocupe a tela toda sem rolagens indesejadas */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        #timeline-embed {
            width: 100%;
            height: 100vh; /* Ocupa exatamente a altura da janela */
        }

        /* ==========================================================================
           ⚠️ CUSTOMIZAÇÃO FORÇADA CONTRA A SOBREPOSIÇÃO
           ========================================================================== */

        /* 1. Aplica um transform para empurrar o texto dos anos (BCE/Era) para baixo */
        .tl-timeaxis .tl-timeaxis-tick .tl-timeaxis-tick-text {
            transform: translateY(12px) !important;
            font-weight: 500 !important;
        }

        /* 2. Caso a barra de fundo da Era esteja cobrindo a régua, empurra ela para cima */
        .tl-timenav-background .tl-era {
            margin-top: -5px !important;
            height: calc(100% - 10px) !important;
        }

        /* 3. Dá mais respiro para as caixas de eventos não colidirem com os números */
        .tl-timenav-slider-container {
            padding-bottom: 15px !important;
        }
    </style>
</head>
<body>

    <!-- O contêiner onde a mágica acontece -->
    <div id="timeline-embed"></div>

    <!-- Script oficial do TimelineJS -->
    <script src="https://knightlab.com"></script>

    <script type="text/javascript">
        // Definição das configurações internas do componente
        var options = {
            language: "pt-br",               // Interface em português
            initial_zoom: 3,                 // Espalha os blocos horizontalmente
            timenav_height_percentage: 45,   // Garante boa altura para a barra inferior
            is_embed: true                   // Otimiza o comportamento de tela inteira
        };

        // 🔴 ATENÇÃO: Substitua o link abaixo pela URL completa da sua Planilha do Google
        var spreadsheet_url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTbZ24kupL50AYzRtPpInT5zNCu9Y8vZlmtKN5oea6YyStj1kS5ovC3Iy4QUl16D7635HpOU4PAzgK-/pub?gid=0&single=true&output=csv";

        // Inicializa a ferramenta
        window.timeline = new TL.Timeline('timeline-embed', spreadsheet_url, options);
    </script>
</body>
</html>
