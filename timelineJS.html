<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Linha do Tempo Customizada</title>
    
    <!-- CSS oficial do TimelineJS -->
    <link title="timeline-styles" rel="stylesheet" href="https://knightlab.com">
    
    <style>
        html, body {
            width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
        }
        #timeline-embed {
            width: 100%; height: 100vh;
        }

        /* 🛠️ AJUSTE DA SOBREPOSIÇÃO DA ERA NO RODAPÉ */
        .tl-timeaxis .tl-timeaxis-tick .tl-timeaxis-tick-text {
            transform: translateY(14px) !important; /* Move os números/Eras mais para baixo */
            font-weight: 500 !important;
        }
        .tl-timenav-background .tl-era {
            margin-top: -5px !important;
            height: calc(100% - 10px) !important;
        }
    </style>
</head>
<body>

    <div id="timeline-embed"></div>

    <!-- O Script JS com a propriedade defer força o navegador a registrar a biblioteca global antes da execução de scripts locais -->
    <script defer src="https://knightlab.com"></script>

    <script type="text/javascript">
        // Garante que o script espere a biblioteca externa e o DOM estarem 100% prontos
        window.addEventListener('load', function() {
            if (typeof TL !== 'undefined') {
                var options = {
                    language: "pt-br",
                    initial_zoom: 3,
                    timenav_height_percentage: 45,
                    is_embed: true
                };

                // Certifique-se de preencher com a sua planilha em formato CSV pública
                var spreadsheet_url = "https://google.com";

                window.timeline = new TL.Timeline('timeline-embed', spreadsheet_url, options);
            } else {
                console.error("A biblioteca TimelineJS não pôde ser carregada a tempo.");
            }
        });
    </script>
</body>
</html>
